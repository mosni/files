# files.mosni.dev / dl.mosni.dev - one container, two vhosts (D-4/D-33).
#
# The 443/TLS blocks are committed HERE rather than left to `certbot --nginx` to inject in place (the
# canonical TLS model - see ../auth/nginx.conf for the precedent). This vhost is a git-tracked file; a
# stack redeploy resets it to its committed form, which would wipe any in-place certbot edits. certbot
# still owns/renews the cert files below (issued via ../infrastructure/lib/deploy's ensure_cert(), D-47);
# nginx just reads them from the live path. One cert, two SANs: files.mosni.dev + dl.mosni.dev.
#
# infra/port-allocation: 33001 is a placeholder until the box-time deploy step confirms the next-free
# port in the stack range and replaces it here and in docker-compose.yml. auth already occupies 33000.
#
# D-4/D-33 (non-negotiable): dl.mosni.dev serves attacker-controlled bytes and MUST NEVER execute
# anything. Its byte root is `internal;` - reachable only via nginx's own X-Accel-Redirect from the app,
# never by a direct client request. No cookie is ever set on this origin and the auth SDK is never loaded
# here; either would undo the containment the origin split buys (E1 ships the vhost only - E5a is what
# starts using it).

server {
    server_name files.mosni.dev;

    # tus PATCH bodies are one chunk each - lib/uploadConfig.ts's UPLOAD_CHUNK_SIZE, currently 5 MB.
    # nginx's DEFAULT client_max_body_size is 1m, so without this every chunk is rejected with
    # "413 Request Entity Too Large" before it ever reaches the app, and no upload can complete. Found on
    # the first real box test. (D-19's rationale says tus "sidesteps nginx body-size limits since each
    # chunk is small" - true only if the limit is actually above the chunk size, which it was not.)
    # Headroom over the chunk size on purpose, so bumping UPLOAD_CHUNK_SIZE a little does not silently
    # reintroduce this. This bounds ONE CHUNK, not the file: D-17's "no file size limit" is unaffected,
    # because a 5 GB upload is ~1000 of these.
    #
    # proxy_request_buffering off: stream each chunk straight to the app instead of spooling it to disk
    # first. The box is a weak Atom with a shared disk (current-context.md), and buffering every chunk
    # would double the write I/O of every upload for no benefit - tus hands the bytes straight to the
    # datastore anyway.
    location /api/upload {
        client_max_body_size 32m;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_pass http://127.0.0.1:33001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:33001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/files.mosni.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/files.mosni.dev/privkey.pem;
}

server {
    server_name files.mosni.dev;
    listen 80;
    return 301 https://$host$request_uri;
}

server {
    server_name dl.mosni.dev;

    # E5a (Wave G1): the vhost's only OTHER location. Proxies every request to the same app container as
    # files. - the app tells apart files./dl. by Host header (Fastify host constraints, routes/delivery.ts)
    # and this route registers only the delivery shape there, so nothing but X-Accel-Redirect delivery is
    # reachable on this host even though it's the same process. No cookie is ever set here and the auth
    # SDK is never loaded here (D-33) - this proxy_pass adds no header that would change that.
    location / {
        proxy_pass http://127.0.0.1:33001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # `internal;` means nginx refuses this to a direct client request (404) and serves it only when the
    # app hands back an X-Accel-Redirect pointing here - Node never streams file bytes (security
    # invariant 2).
    location /internal-storage/ {
        internal;

        # Security invariants 3 & 4 (technical-baseline.md §1), set HERE and not only on the app response.
        # When the app returns X-Accel-Redirect, nginx serves the bytes fresh from this location and does
        # NOT carry over arbitrary headers the app set on the redirect response - it forwards Content-Type
        # and Content-Disposition (so forced-attachment still holds) but DROPS X-Content-Type-Options and
        # Referrer-Policy. So the delivered bytes reached the client with no `nosniff` and no
        # `no-referrer`, which is exactly the MIME-sniffing containment invariant 3 exists to guarantee.
        # Invisible until real nginx sat in front of the app in e2e: the integration test asserted these on
        # the app's own response, which has them, not on what the client actually receives. `always` so
        # they ride error responses too.
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;

        # Preliminary-review P3: outside the app deploy dir so a redeploy cannot wipe uploads. MUST match
        # docker-compose.yml's host volume mount exactly (both /srv/stack/data/files/storage).
        alias /srv/stack/data/files/storage/;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/files.mosni.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/files.mosni.dev/privkey.pem;
}

server {
    server_name dl.mosni.dev;
    listen 80;
    return 301 https://$host$request_uri;
}
