# D-45: verification runs in Docker. The integration suite needs real MariaDB + redis anyway, and the dev
# checkout is on Node 20 against a Node 24 target - a host-native gate would pass or fail differently per
# machine, which is not a gate.
#
# Three tiers:
#   - `verify-unit` - fast, service-free (app/test/unit only, no datastores, no builds). The TDD inner loop.
#   - `verify`      - the full gate and definition of done: coverage-gated unit + integration tests, both
#                     Vite builds, against real MariaDB + redis.
#   - `verify-e2e`  - browser-driven (D-53, reverses D-28): `app-e2e` runs the actual built image against
#                     real MariaDB + redis, and `verify-e2e` drives a real Chromium against it via
#                     Playwright. Separate from `verify` since it needs the production image built, not
#                     just the Vite outputs, and a browser-capable base image.
#
# Both build (rather than bind-mount, as an earlier version of this file did) so `npm ci` is a cached
# layer: it only re-runs when package.json/package-lock.json actually change (Docker caches by content
# hash), not on every invocation. A bind-mount + `npm ci` on every run reinstalled 200+ packages every
# time - a real cost for a TDD project meant to run its suite constantly - and also let the container's
# Linux `npm ci` overwrite the host's own `node_modules/.bin` shims through the mount, breaking host-side
# `tsc`. Building instead avoids both problems.
x-node-build: &node-build
  context: .
  dockerfile_inline: |
    FROM node:24-alpine
    # vips + vips-dev so sharp builds from source against the SYSTEM libvips here too, exactly as the
    # production Dockerfile does. This is D-45's own argument applied to a second axis: the box is an
    # Atom N2800 that cannot execute the SSE4.1 in sharp's prebuilt libvips, so a gate running the
    # prebuilt would be testing a different image library (and a different libvips version) than the one
    # that ships - which is not a gate. Costs one cached layer.
    RUN apk add --no-cache ffmpeg vips vips-dev build-base pkgconfig python3
    WORKDIR /repo
    COPY package.json package-lock.json ./
    RUN npm ci
    COPY . .

services:
  redis:
    image: redis:7-alpine

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: files
      MARIADB_USER: files
      MARIADB_PASSWORD: filespass
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 2s
      timeout: 5s
      retries: 20

  verify-unit:
    build: *node-build
    working_dir: /repo
    command: ["npx", "vitest", "run", "app/test/unit"]

  verify:
    build: *node-build
    working_dir: /repo
    depends_on:
      redis:
        condition: service_started
      mariadb:
        condition: service_healthy
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_USER: files
      DB_PASS: filespass
      DB_NAME: files
      REDIS_URL: redis://redis:6379
      BOT_API: http://bot-core:8080
      AUTH_ISSUER: https://auth.mosni.dev
      APP_ORIGIN: https://files.mosni.dev
      DL_ORIGIN: https://dl.mosni.dev
      STORAGE_ROOT: /tmp/storage
      PORT: "3000"
    # D-70: `vite build` must run BEFORE the tests, not after - the preview shell-splice reads the built
    # web/dist/index.html, and running tests first would let every integration test silently exercise only
    # the fallback shell (a missing web/dist just warns, per server.ts's fastifyStatic comment). Do not
    # "tidy" this order back.
    command:
      - sh
      - -lc
      - >-
        npx vite build &&
        npx vitest run --coverage &&
        npx vite build --config vite.ssr.config.ts

  # The real, production-built image (Dockerfile), not the dev toolchain - so e2e exercises what actually
  # ships. No published port; verify-e2e reaches it by service name over the compose network.
  # A real RS256 issuer for the e2e tier only (e2e/mock-idp.mjs). auth.mosni.dev is unreachable from this
  # sandbox, and without an issuer the suite could never mint a token the app's own verify() accepts - so
  # every authorized path was tested only by mocking the verifier, and the product invariant had no
  # end-to-end coverage at all. This closes that. It is never referenced outside this compose file.
  mock-idp:
    build:
      context: .
      dockerfile_inline: |
        FROM node:24-alpine
        WORKDIR /repo
        COPY package.json package-lock.json ./
        RUN npm ci --omit=optional --ignore-scripts
        COPY e2e/mock-idp.mjs ./e2e/mock-idp.mjs
    command: ["node", "e2e/mock-idp.mjs", "9000"]
    environment:
      MOCK_ISSUER: http://mock-idp:9000
      MOCK_AUDIENCE: https://files-e2e.test
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9000/health"]
      interval: 2s
      timeout: 5s
      retries: 20

  # The REAL nginx.conf in front of the real app image, so e2e exercises the deployed topology rather
  # than talking to the container directly. Nothing tested this file before, which is why two production
  # bugs escaped in a row: the http:// tus Location (nothing sent X-Forwarded-Proto) and a 413 on every
  # upload chunk (nginx defaults client_max_body_size to 1m; the tus chunk is 5 MB).
  #
  # Only genuinely environment-specific lines are rewritten - the upstream address, the hostnames, and TLS
  # (no certs exist here, so the 443 blocks become the default :80 and the plain-HTTP redirect blocks are
  # parked on :8080 where nothing calls them). Everything that carries BEHAVIOUR is used verbatim from the
  # committed file: location precedence, client_max_body_size, proxy_request_buffering, the X-Forwarded-*
  # headers, and the internal-only storage location.
  nginx-e2e:
    image: nginx:1.28-alpine
    depends_on:
      app-e2e:
        condition: service_healthy
    volumes:
      - ./nginx.conf:/seed/nginx.conf:ro
      - e2e-storage:/srv/stack/data/files/storage:ro
    command:
      - sh
      - -lc
      - |
        sed -e 's#proxy_pass http://127.0.0.1:33001;#proxy_pass http://app-e2e:80;#g'             -e 's#server_name files.mosni.dev;#server_name files-e2e.test;#g'             -e '/listen 443 ssl;/d' -e '/ssl_certificate/d'             -e 's#listen 80;#listen 8080;#g'             /seed/nginx.conf > /etc/nginx/conf.d/default.conf
        nginx -t && exec nginx -g 'daemon off;'
    networks:
      default:
        aliases:
          - files-e2e.test
          # dl. resolves to nginx too, so X-Accel-Redirect delivery is exercised for real: nginx serves the
          # bytes from the internal-only location off the shared storage volume. Nothing had ever tested
          # that nginx actually serves what the app redirects to - only that the header was set.
          - dl.mosni.dev
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 2s
      timeout: 5s
      retries: 20

  app-e2e:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_started
      mariadb:
        condition: service_healthy
      mock-idp:
        condition: service_healthy
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_USER: files
      DB_PASS: filespass
      DB_NAME: files
      REDIS_URL: redis://redis:6379
      BOT_API: http://bot-core:8080
      # Points at the throwaway issuer above, NOT the real auth.mosni.dev (unreachable here). This is what
      # lets the suite mint a token the app's own unmodified verify() accepts, so upload is finally tested
      # end to end instead of by mocking the verifier.
      AUTH_ISSUER: http://mock-idp:9000
      # D-70 Wave D: `files-e2e.test`, NOT the real `files.mosni.dev` - `mosni.dev` is on Chromium's
      # baked-in HSTS preload list (confirmed empirically: a headless Chromium hitting a plain
      # `http://files.mosni.dev/...` silently upgrades to `https://` and gets ERR_CONNECTION_REFUSED, since
      # nothing in this sandbox listens on 443 - reproduced with an identical `--add-host`-mapped
      # non-mosni.dev hostname working fine over plain HTTP on the same IP, isolating the hostname string
      # itself as the cause, not networking). This is a browser-binary-level policy, not fixable via
      # config; `.test` is IANA-reserved for testing (RFC 2606) and can never be preload-listed.
      # e2e-tier-only: production's real config lives in the deploy manifest, not here.
      # DL_ORIGIN stays the REAL `https://dl.mosni.dev`, deliberately NOT given the same `-e2e.test`
      # treatment: server.ts's CSP frame-src/img-src/media-src directives hardcode the literal string
      # "https://dl.mosni.dev" (not derived from config.dlOrigin), so a preview's <iframe>/<img> pointing
      # anywhere else would trip a REAL CSP violation. `dl.` is only ever a subresource load inside an
      # already-loaded document, never a top-level navigation, so it never hits the HSTS-preload problem
      # that affects `files.` above - the request is expected to fail to connect (nothing here has a TLS
      # listener for it), which is fine and unrelated to what e2e/preview.spec.ts's CSP test checks for.
      APP_ORIGIN: https://files-e2e.test
      DL_ORIGIN: https://dl.mosni.dev
      STORAGE_ROOT: /data/storage
      # D-70 Wave D: 80, not 3000, here specifically (production's own port; nothing else in the app
      # depends on the number 3000). Fastify's `constraints: { host }` does an EXACT string match against
      # the raw incoming Host header (find-my-way's accept-host strategy - confirmed by reading it), which
      # is registered as the bare hostname above (no port). A browser always includes the port in its Host
      # header for a non-default port, so hitting this container on :3000 would send a Host header with
      # ":3000" appended and never match any host-constrained route. Port 80 is HTTP's default, so the
      # browser omits it - exactly mirroring how production omits 443 for HTTPS. Spoofing the Host header
      # instead was tried and rejected: Chromium throws net::ERR_INVALID_ARGUMENT from
      # browser.newContext's extraHTTPHeaders, and page.route()'s CDP-level header rewrite is silently
      # dropped for the main-frame navigation request specifically.
      PORT: "80"
    # D-70 Wave D: shared with verify-e2e below, so e2e/preview.spec.ts can seed a fixture file at the
    # exact path app-e2e will stat() - there is no live IdP in this sandbox to drive a real upload (same
    # limitation upload-delivery.spec.ts documents), so seeding writes bytes directly into this volume and
    # inserts the matching row straight into mariadb.
    volumes:
      - e2e-storage:/data/storage
    # D-70 Wave D: real DNS aliases on the compose network, so e2e/preview.spec.ts's browser-driven tests
    # can navigate a genuine host-constrained route (`/f/*` etc. require a matching Host header) - this
    # mirrors what nginx's proxy_pass does in production: a real Host header naming the app, routed to
    # this container's real address.
    networks:
      default:
        aliases:
          # files-e2e.test now resolves to nginx-e2e, NOT here - traffic must traverse the real vhost.
          # This name stays so a spec can still reach the app directly when it needs to simulate what nginx
          # itself sends (e.g. asserting tus honours X-Forwarded-Proto, which real nginx would overwrite).
          - app-direct.test
    healthcheck:
      # 127.0.0.1, not localhost: this alpine image's `localhost` resolves ::1 (IPv6) first, and Fastify's
      # `host: "0.0.0.0"` binds IPv4 only - wget would get "connection refused" against the IPv6 attempt.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 2s
      timeout: 5s
      retries: 20

  verify-e2e:
    build:
      context: .
      dockerfile_inline: |
        FROM mcr.microsoft.com/playwright:v1.61.1-noble
        WORKDIR /repo
        COPY package.json package-lock.json ./
        RUN npm ci
        COPY . .
    working_dir: /repo
    depends_on:
      app-e2e:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      mock-idp:
        condition: service_healthy
      # Without this, `docker compose run verify-e2e` never starts nginx-e2e on its own (it's outside
      # verify-e2e's dependency graph) - files-e2e.test and dl.mosni.dev then simply don't resolve, and
      # every spec that navigates through the real vhost fails with ERR_NAME_NOT_RESOLVED. Only ever
      # worked before this fix if nginx-e2e happened to already be running from an earlier `up`/`run`.
      nginx-e2e:
        condition: service_healthy
    environment:
      BASE_URL: http://app-e2e
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_USER: files
      DB_PASS: filespass
      DB_NAME: files
    volumes:
      - e2e-storage:/data/storage
    command: ["npx", "playwright", "test"]

volumes:
  e2e-storage: {}
