services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: [.env]
    # auth.mosni.dev is hosted on THIS box, so it resolves to the box's own public IP - and a container
    # reaching its host's public IP needs hairpin/loopback NAT, which the box does not do. Result: the
    # container reaches the open internet fine but not auth.mosni.dev specifically, so the JWKS fetch inside
    # verify() times out and every real token is rejected with "invalid token" (a 401 on POST /api/upload).
    # Confirmed by elimination: the token verifies with the app's exact logic against auth's public JWKS
    # from outside the box, so only the container->auth hop was left. host-gateway points auth.mosni.dev at
    # the docker host, whose nginx serves that vhost (real cert, SNI auth.mosni.dev) - the same nginx an
    # external client would hit, just without the public round-trip. This is only needed because auth lives
    # on the same box; a cross-box IdP would resolve normally.
    extra_hosts:
      - "auth.mosni.dev:host-gateway"
    environment:
      BOT_API: http://bot-core:8080
      PORT: "3000"
      # NOTE: VIPS_NOVECTOR=1 was tried here first and REMOVED - it cannot fix the exit 132 (SIGILL) crash
      # and set a misleading expectation. That flag disables libvips' optional Highway/SIMD paths for image
      # operations; the faulting instruction is a `pmaxud` (SSE4.1) emitted by the compiler in ordinary glib
      # hash-table code, executed during module load, which no runtime flag reaches. The box is an Intel
      # Atom N2800 whose ISA ends at SSSE3. The real fix is in the Dockerfile: sharp is built from source
      # against Alpine's baseline-x86-64 system libvips. See D-78.
    # Host port is allocated from the stack range (stack.env PORT_BASE..PORT_MAX) on the box at deploy.
    # PORT NOTE (infra/port-allocation): 33001 is a placeholder so the file stays valid - auth already
    # occupies 33000. At deploy, confirm the next-free port on the box (scan apps/ for 127.0.0.1:<port>)
    # and replace BOTH this value and the one in nginx.conf before bringing the container up.
    ports: ["127.0.0.1:33001:3000"]
    networks:
      # Mandatory (D-32/D-49): auth identifies a calling app by its network alias, which must equal its
      # role namespace ("files"). Without this every internal API call returns 403 unknown_caller.
      stack:
        aliases: [files]
    volumes:
      # Uploaded bytes live on the host disk, never baked into the image (D-13). This path is also what
      # nginx.conf's dl.mosni.dev vhost reads directly via X-Accel-Redirect (D-5/D-18: not backed up).
      #
      # Preliminary-review P3: the host path is DELIBERATELY outside the app's deploy dir
      # (/srv/stack/apps/files/) so a stack redeploy that rebuilds/cleans the app directory cannot wipe
      # uploaded files. INFRA CONFIRM NEEDED (flagged for Hannah): verify /srv/stack/data/ is the right
      # convention for persistent app data on the box and that the deploy ritual never manages/cleans it;
      # the box must have this directory (mkdir -p) before first up. Keep this path in sync with
      # nginx.conf's `alias` in the dl.mosni.dev internal-storage location.
      - /srv/stack/data/files/storage:/data/storage
networks:
  stack:
    external: true
